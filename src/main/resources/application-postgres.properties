# Render/PostgreSQL profile.
# Recommended Render env vars:
# SPRING_PROFILES_ACTIVE=postgres
# DATABASE_URL=<Render Internal Database URL>  (postgres://user:password@host:port/database)
# CORS_ALLOWED_ORIGINS=https://your-frontend.vercel.app,http://localhost:5173

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:safelab_db}?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:safelab_user}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.h2.console.enabled=false
