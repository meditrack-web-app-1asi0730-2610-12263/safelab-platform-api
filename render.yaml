services:
  - type: web
    name: safelab-platform-api
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: CORS_ALLOWED_ORIGINS
        value: https://safelab-frontend.vercel.app,http://localhost:5173
      - key: SEED_RESET_ON_START
        value: false
      - key: JAVA_OPTS
        value: -XX:MaxRAMPercentage=75.0
      # Add DATABASE_URL manually from your Render PostgreSQL Internal Database URL.
